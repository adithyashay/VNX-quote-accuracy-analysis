name: Scheduled matched quote pipeline

on:
  schedule:
    # GitHub cron uses UTC. This broad window covers US market hours in
    # daylight and standard time; the Python job also checks Eastern hours.
    # Odd minutes avoid the busiest GitHub Actions schedule boundaries.
    - cron: "7,22,37,52 13-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: scheduled-matched-pipeline
  cancel-in-progress: false

jobs:
  collect-and-match:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VIANEXUS_API_TOKEN: ${{ secrets.VIANEXUS_API_TOKEN }}
      BATCH_SIZE: "100"
      COLLECTION_INTERVAL_SECONDS: "900"
      MATCHER_INTERVAL_SECONDS: "900"
      MATCHER_VALID_WINDOW_SECONDS: "60"
      MATCHED_RETENTION_DAYS: "0"
      SAVE_CSV_BACKUP: "false"
      HEALTH_HEARTBEAT_INTERVAL_SECONDS: "900"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Show run context
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          print("UTC time:", datetime.now(timezone.utc).isoformat())
          print("Eastern time:", datetime.now(ZoneInfo("America/New_York")).isoformat())
          print("DATABASE_URL configured:", bool(os.getenv("DATABASE_URL")))
          print("VIANEXUS_API_TOKEN configured:", bool(os.getenv("VIANEXUS_API_TOKEN")))
          PY

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scheduled matched-only cycle
        run: python -m scripts.run_scheduled_matched_pipeline
