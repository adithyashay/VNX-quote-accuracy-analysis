databases:
  - name: vnx-quote-db

services:
  - type: web
    name: vnx-quote-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m scripts.bootstrap_production_database
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vnx-quote-db
          property: connectionString
      - key: DASHBOARD_AUTH_ENABLED
        value: "true"
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: COLLECTION_INTERVAL_SECONDS
        value: "60"
      - key: MATCHER_INTERVAL_SECONDS
        value: "300"

  - type: worker
    name: vnx-quote-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m scripts.bootstrap_production_database
    startCommand: python -m scripts.run_market_pipeline
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vnx-quote-db
          property: connectionString
      - key: VIANEXUS_API_TOKEN
        sync: false
      - key: BATCH_SIZE
        value: "100"
      - key: COLLECTION_INTERVAL_SECONDS
        value: "60"
      - key: MATCHER_INTERVAL_SECONDS
        value: "300"
      - key: MATCHER_VALID_WINDOW_SECONDS
        value: "60"
      - key: SAVE_CSV_BACKUP
        value: "false"
      - key: HEALTH_HEARTBEAT_INTERVAL_SECONDS
        value: "300"
